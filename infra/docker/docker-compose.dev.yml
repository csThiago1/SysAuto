services:

  # ─── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: paddock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paddock
      POSTGRES_PASSWORD: paddock
      POSTGRES_DB: paddock_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paddock -d paddock_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: paddock_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak 24 ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: paddock_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/paddock_dev
      KC_DB_USERNAME: paddock
      KC_DB_PASSWORD: paddock
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak/themes/paddock:/opt/keycloak/themes/paddock
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── Django 5 — API principal ─────────────────────────────────────────────
  django:
    build:
      context: ../../backend/core
      dockerfile: Dockerfile.dev
    image: paddock-django:dev
    container_name: paddock_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate_schemas --settings=config.settings.dev &&
             python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev"
    env_file:
      - ../../.env
    volumes:
      - ../../backend/core:/app          # hot-reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/schema/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery:
    image: paddock-django:dev
    container_name: paddock_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4 -Q celery,fiscal,crm,ai
    env_file:
      - ../../.env
    volumes:
      - ../../backend/core:/app
    depends_on:
      django:
        condition: service_started
      redis:
        condition: service_healthy

  # ─── Celery Beat (tarefas agendadas) ──────────────────────────────────────
  celery-beat:
    image: paddock-django:dev
    container_name: paddock_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ../../.env
    volumes:
      - ../../backend/core:/app
    depends_on:
      django:
        condition: service_started
      redis:
        condition: service_healthy

  # ─── Mailhog (e-mail local) ───────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: paddock_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - tools

volumes:
  postgres_data:
    name: paddock_postgres_data
  redis_data:
    name: paddock_redis_data
